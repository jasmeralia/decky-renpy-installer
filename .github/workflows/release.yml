name: Draft Release

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - uses: pnpm/action-setup@v6
        with:
          version: 9

      - uses: actions/setup-node@v6
        with:
          node-version: '20'
          cache: 'pnpm'

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm run lint

      - name: Build
        run: pnpm run build

      - name: Package zip
        run: |
          mkdir -p /tmp/decky-pkg/decky-renpy-installer/dist
          cp plugin.json main.py package.json /tmp/decky-pkg/decky-renpy-installer/
          cp dist/index.js /tmp/decky-pkg/decky-renpy-installer/dist/
          cd /tmp/decky-pkg
          version="${GITHUB_REF#refs/tags/v}"
          zip -r "$GITHUB_WORKSPACE/decky-renpy-installer-${version}.zip" decky-renpy-installer/

      - name: Get current tag
        id: tag
        run: echo "name=${GITHUB_REF#refs/tags/}" >> "$GITHUB_OUTPUT"

      - name: Get last published release tag
        id: last_release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          last=$(gh release list --exclude-drafts --limit 1 --json tagName --jq '.[0].tagName // ""')
          echo "tag=$last" >> "$GITHUB_OUTPUT"

      - name: Generate changelog
        id: changelog
        run: |
          current="${{ steps.tag.outputs.name }}"
          last="${{ steps.last_release.outputs.tag }}"
          if [ -n "$last" ]; then
            notes=$(git log "${last}..${current}" --pretty=format:"- %s" --no-merges)
          else
            notes=$(git log "${current}" --pretty=format:"- %s" --no-merges)
          fi
          {
            echo "notes<<EOF"
            echo "$notes"
            echo "EOF"
          } >> "$GITHUB_OUTPUT"

      - name: Create draft release
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="${{ steps.tag.outputs.name }}"
          version="${version#v}"
          gh release create "${{ steps.tag.outputs.name }}" \
            "decky-renpy-installer-${version}.zip" \
            --title "${{ steps.tag.outputs.name }}" \
            --notes "${{ steps.changelog.outputs.notes }}" \
            --draft
